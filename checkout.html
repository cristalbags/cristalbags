<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout • Cristal Bags</title>
<link rel="stylesheet" href="/css/style.css" />
<style>
body {
  margin:0;
  font-family: inherit;
  background: linear-gradient(135deg,#f8cdda,#c2e9fb,#fbc2eb);
  min-height:100vh;
}

.checkout-wrapper{
  max-width:1100px;
  margin:60px auto;
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:40px;
  padding:20px;
}

.card{
  background: rgba(255,255,255,0.75);
  backdrop-filter: blur(12px);
  border-radius:24px;
  padding:32px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h2{
  margin-top:0;
  font-weight:600;
}

.input-group{
  margin-bottom:18px;
}

input{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,0.08);
  background:white;
  font-size:15px;
}

.grid-2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.summary-item{
  display:flex;
  justify-content:space-between;
  margin-bottom:12px;
  font-size:14px;
}

.total{
  margin-top:20px;
  font-weight:600;
  font-size:18px;
  display:flex;
  justify-content:space-between;
}

.checkout-btn{
  margin-top:25px;
  width:100%;
  padding:16px;
  border:none;
  border-radius:16px;
  background:linear-gradient(90deg,#ff9a9e,#fad0c4);
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.checkout-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

@media(max-width:900px){
  .checkout-wrapper{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<div class="checkout-wrapper">

  <div class="card">
    <h2>Informações de Entrega</h2>

    <div class="input-group">
      <input id="name" placeholder="Nome completo" required />
    </div>

    <div class="input-group">
      <input id="email" type="email" placeholder="Email" required />
    </div>

    <div class="input-group">
      <input id="phone" placeholder="Telefone" required />
    </div>

    <div class="grid-2">
      <input id="street" placeholder="Rua" required />
      <input id="number" placeholder="Número" required />
    </div>

    <div class="grid-2" style="margin-top:14px;">
      <input id="city" placeholder="Cidade" required />
      <input id="state" placeholder="Estado" required />
    </div>

    <div class="input-group" style="margin-top:14px;">
      <input id="zip" placeholder="CEP" required />
    </div>

    <button type="button" class="checkout-btn" id="confirmBtn">
      Finalizar Compra
    </button>
  </div>

  <div class="card">
    <h2>Resumo do Pedido</h2>
    <div id="summary"></div>
    <div class="total">
      <span>Total</span>
      <span id="total"></span>
    </div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const raw =
    localStorage.getItem("cb_cart_v2") ||
    localStorage.getItem("cb_cart");

  const parsed = raw ? JSON.parse(raw) : null;

  const cart = Array.isArray(parsed)
    ? parsed
    : parsed?.items || [];

  if (!cart.length) {
    alert("Carrinho vazio.");
    window.location.href = "/";
    return;
  }

  /* ---------------------------
     RENDER SUMMARY
  ---------------------------- */

  const summaryEl = document.getElementById("summary");
  const totalEl = document.getElementById("total");

  summaryEl.innerHTML = "";

  let total = 0;

  const res = await fetch("/data/products.json");
  const products = await res.json();

  cart.forEach(item => {

    const product = products.find(p => p.sku === item.sku);
    if (!product) return;

    const qty = item.qty || item.quantity || 1;

    let price = product.price_cents || 0;

    // Variant support (CB-003 etc)
    if (product.variants && item.variantId) {
      const variant = product.variants.find(v => v.id == item.variantId);
      if (variant && variant.price_cents) {
        price = variant.price_cents;
      }
    }

    const lineTotal = price * qty;
    total += lineTotal;

    const div = document.createElement("div");
    div.className = "summary-item";
    div.innerHTML = `
      <span>${product.name} x${qty}</span>
      <span>R$ ${(lineTotal / 100).toFixed(2)}</span>
    `;

    summaryEl.appendChild(div);
  });

  totalEl.textContent = "R$ " + (total / 100).toFixed(2);

  /* ---------------------------
     CHECKOUT CLICK
  ---------------------------- */

  const confirmBtn = document.getElementById("confirmBtn");

  confirmBtn.addEventListener("click", async () => {

    const requiredFields = [
      "name","email","phone",
      "street","number","city","state","zip"
    ];

    for (const id of requiredFields) {
      const el = document.getElementById(id);
      if (!el || !el.value.trim()) {
        alert("Preencha todos os campos.");
        return;
      }
    }

    const shippingData = {
      name: document.getElementById("name").value.trim(),
      email: document.getElementById("email").value.trim(),
      phone: document.getElementById("phone").value.trim(),
      street: document.getElementById("street").value.trim(),
      number: document.getElementById("number").value.trim(),
      city: document.getElementById("city").value.trim(),
      state: document.getElementById("state").value.trim(),
      zip: document.getElementById("zip").value.trim(),
    };

    try {

      console.log("Sending checkout request...");

      const response = await fetch("/api/create-preference", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          items: cart,
          shipping: shippingData
        })
      });

      const data = await response.json();
      console.log("Response:", data);

      if (data.checkout_url) {
        window.location.href = data.checkout_url;
      } else {
        alert(data.error || "Erro ao iniciar pagamento.");
      }

    } catch (err) {
      console.error(err);
      alert("Erro ao iniciar pagamento.");
    }

  });

});
</script>

</body>
</html>
